params:
  # Nowledge Mem 主服务参数
  - id: ip_allowlist
    type: string
    name: "IP Allowlist"
    description: "Allowed IP addresses/CIDR ranges, comma-separated (e.g. 0.0.0.0/0,::/0 for all)"
    default_value: "0.0.0.0/0,::/0"

  # Nowledge Mem Snap 参数
  - id: snap_admin_username
    type: string
    name: "Snap Admin Username"
    description: "Bootstrap administrator username for Memory Snap initial login"
    default_value: "admin"
    optional: false

  - id: snap_admin_password
    type: secret
    name: "Snap Admin Password"
    description: "Bootstrap administrator password for Memory Snap (auto-generated random password recommended)"
    default_value: "$random(len=20)"
    optional: false

  - id: snap_session_secret
    type: secret
    name: "Snap Session Secret"
    description: "Secret key for Memory Snap session encryption (auto-generated random value recommended)"
    default_value: "$random(len=32)"
    optional: false

  - id: snap_tz
    type: string
    name: "Snap Timezone"
    description: "Memory Snap schedule times and retention boundaries timezone (e.g. UTC, Asia/Shanghai, America/New_York)"
    default_value: "Asia/Shanghai"
    optional: false

  - id: snap_nmeme_api_key
    type: secret
    name: "Snap Nowledge Mem API Key"
    description: "API key for the Nowledge Mem API source in Memory Snap. Leave empty to configure later."
    default_value: ""
    optional: true

  - id: snap_oidc_enabled
    type: bool
    name: "Enable Snap OIDC"
    description: "Enable LazyCat platform OpenID Connect single sign-on for Memory Snap. Client ID/Secret and Redirect URL are auto-configured."
    default_value: "true"
    optional: false

  - id: snap_oidc_allowed_domains
    type: string
    name: "Snap OIDC Allowed Domains"
    description: "Comma-separated list of allowed email domains for Memory Snap OIDC login (e.g. example.com). Leave empty to allow all."
    default_value: ""
    optional: true

