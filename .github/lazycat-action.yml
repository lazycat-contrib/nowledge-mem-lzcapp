version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/nowledge-mem.lpk

update:
  strategy: publish
  version_source:
    type: image
    image: mem

build:
  run_buildscript: false

images:
  - id: mem
    target: service
    service: mem
    source: docker.io/nowledgelabs/mem
    channel: stable
    tag_regex: '^v?\d+\.\d+\.\d+-vulkan$'
    version_regex: '^v?(?P<version>\d+\.\d+\.\d+)-vulkan$'
    delivery:
      mode: lazycat

  - id: snap
    target: service
    service: nowledge-mem-snap
    source: docker.io/czyt/nowledge-mem-snap
    channel: stable
    tag_regex: '^v?\d+\.\d+\.\d+$'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: true
    skip_if_version_exists: true
    create_if_missing: false
    changelog_locales: [zh, en]
  private:
    enabled: true
    skip_if_version_exists: true
    name: NowledgeMem
    summary: Published from GitHub Actions
