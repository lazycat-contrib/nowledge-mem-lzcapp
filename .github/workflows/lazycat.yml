name: Publish LazyCat application

on:
  pull_request:
    paths:
      - .github/lazycat-action.yml
      - .github/workflows/lazycat.yml
      - lzc-build.yml
      - lzc-manifest.yml
      - package.yml
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lazycat:
    uses: ca-x/lazycat-github-action/.github/workflows/lazycat.yml@v1
    with:
      operation: auto
      config: .github/lazycat-action.yml
      dry-run: ${{ github.event_name == 'pull_request' }}
      versioned-release-asset: true
    # The LazyCat token may be defined as an organization or repository
    # Secret. A repository Secret with the same name takes precedence.
    secrets: inherit
