package: community.lazycat.app.nowledge-mem
version: 0.9.15
name: NowledgeMem
description: "AI tools change.Your memory should not."
author: "nowledge-co"
homepage: https://mem.nowledge.co
min_os_version: 1.5.2

import_resources:
  - kind: skills
  - kind: mcp-providers

locales:
  zh:
    name: "NowledgeMem"
    description: "你的智能体、AI 助手、代码工具，共享一套记忆"
    entries.main.title: "NowledgeMem"
    entries.snap.title: "记忆快照"
    usage: |
      首次运行会自动生成一个默认 API Key，请妥善保管——连接 AI 工具时需要用到，可从程序日志中查看。
      懒猫相关的skills 可以在/lzcapp/run/resources/skill读入
  en:
    name: "NowledgeMem"
    description: "Your intelligences, AI assistants, and code tools share a set of memories."
    entries.main.title: "NowledgeMem"
    entries.snap.title: "Memory Snap"
    usage: |
      First run will auto-generate a default API Key. Please save it carefully — it is required for connecting AI tools.  you can find it in the application logs.
      LazyCat related skills can be found in /lzcapp/run/resources/skills.

permissions:
  required:
    - net.internet
    - lzcapp.user_delegate
    - document.private
