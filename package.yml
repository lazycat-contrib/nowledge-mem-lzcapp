package: community.lazycat.app.nowledge-mem
version: 0.9.25
name: NowledgeMem
description: "AI tools change.Your memory should not."
author: "nowledge-co"
homepage: https://mem.nowledge.co
min_os_version: 1.5.2

import_resources:
  - kind: skills
  - kind: mcp-providers

locales:
  zh:
    name: "NowledgeMem"
    description: "你的智能体、AI 助手、代码工具，共享一套记忆"
    entries.main.title: "NowledgeMem"
    entries.snap.title: "记忆快照"
    usage: |
      首次运行会自动生成一个默认 API Key，请妥善保管。连接 AI 工具时需要使用该密钥，可从应用日志中查看。
      本应用已导入懒猫本地 Skills 和 MCP Provider 资源。AI Agent 可先读取 /lzcsys/run/pkgm/resources/skills/system/lazycat-local-resource.skill/SKILL.md，再按其说明从 /lzcapp/run/resources/skills/ 和 /lzcapp/run/resources/mcp-providers/ 发现可用资源。
      MCP Provider 的 mcp.yml 会提供 endpoint；访问地址按 http://app.<应用包名>.lzcx<endpoint> 拼接。访问其他应用提供的 MCP 时，程序需要携带真实用户请求中的 X-HC-USER-TICKET。
  en:
    name: "NowledgeMem"
    description: "Your intelligences, AI assistants, and code tools share a set of memories."
    entries.main.title: "NowledgeMem"
    entries.snap.title: "Memory Snap"
    usage: |
      On first run, NowledgeMem auto-generates a default API key. Keep it safe; AI tools need this key to connect, and you can find it in the application logs.
      This app imports LazyCat local Skills and MCP Provider resources. AI agents should load /lzcsys/run/pkgm/resources/skills/system/lazycat-local-resource.skill/SKILL.md first, then discover available resources from /lzcapp/run/resources/skills/ and /lzcapp/run/resources/mcp-providers/.
      Each MCP Provider supplies an endpoint in mcp.yml. Build the final URL as http://app.<package-id>.lzcx<endpoint>. When calling MCP providers from other apps, the program must forward the real user's X-HC-USER-TICKET.

permissions:
  required:
    - net.internet
    - lzcapp.user_delegate
    - document.private
