manifest: ./lzc-manifest.yml
pkgout: ./dist
icon: ./icon.png

compose_override:
  services:
    mem:
      devices:
        - /dev/dri:/dev/dri
      read_only: true
      tmpfs:
        - /tmp:size=64m,mode=1777
      cap_drop:
        - ALL
      security_opt:
        - no-new-privileges:true
      pids_limit: 512
      mem_reservation: 1g
    nowledge-mem-snap:
      read_only: true
      tmpfs:
        - /tmp:size=64m,mode=1777
      cap_drop:
        - ALL
      security_opt:
        - no-new-privileges:true
      pids_limit: 256
      mem_reservation: 512m
